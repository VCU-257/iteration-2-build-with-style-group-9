<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lumen/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container py-4" style="max-width: 640px;">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="event-details-page.html" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <h1 class="h5 mb-0">Payment</h1>
            <span></span>
        </div>

        <!-- Order Summary -->
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="h6 mb-0">Order Summary</h2>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                    <span id="event-name">Event Name</span>
                    <span id="ticket-count">1 ticket</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold">
                    <span>Total</span>
                    <span id="total-price">$0.00</span>
                </div>
            </div>
        </div>

        <!-- Payment Form -->
        <div class="card">
            <div class="card-header">
                <h2 class="h6 mb-0">Payment Details</h2>
            </div>
            <div class="card-body">
                <form id="payment-form">

                    <!-- Cardholder Name -->
                    <div class="mb-3">
                        <label for="cardholder-name" class="form-label">Cardholder Name</label>
                        <input type="text" class="form-control" id="cardholder-name"
                               placeholder="Jane Doe" required>
                    </div>

                    <!-- Card Number -->
                    <div class="mb-3">
                        <label for="card-number" class="form-label">Card Number</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                            <input type="text" class="form-control" id="card-number"
                                   placeholder="1234 5678 9012 3456" maxlength="19" required>
                        </div>
                    </div>

                    <!-- Expiry + CVV -->
                    <div class="row g-3 mb-4">
                        <div class="col-7">
                            <label for="expiry" class="form-label">Expiration Date</label>
                            <input type="text" class="form-control" id="expiry"
                                   placeholder="MM / YY" maxlength="7" required>
                        </div>
                        <div class="col-5">
                            <label for="cvv" class="form-label">CVV</label>
                            <input type="text" class="form-control" id="cvv"
                                   placeholder="123" maxlength="4" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-lock-fill me-2"></i>Pay Now
                    </button>

                </form>
            </div>
        </div>

    </div>
</body>
</html>
